name: Create Azure Resouces

on:
  push:
    branches:
      - main

    paths:
      - bicep/**
      - .github/workflows/infra.yml
  workflow_dispatch:
    
jobs:
  
  create-azure-resources:

    env:
      LOCATION: eastus
      RESOURCE_GROUP_NAME: rg-apim-mock-demo
      PUBLISHER_NAME: contoso

    runs-on: ubuntu-latest

    outputs:
      webappName: ${{ steps.armDeployment.outputs.webappName }}
      apimName: ${{ steps.armDeployment.outputs.apimName }}
      webFQDN: ${{ steps.armDeployment.outputs.webFQDN }}

    steps:

      - uses: actions/checkout@v2

      - name: Azure Login
        uses: Azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Resource Group
        run: |
          az group create -n ${{ env.RESOURCE_GROUP_NAME }} -l ${{ env.LOCATION }}

      - name: Deploy Azure Resources
        id: armDeployment
        uses: azure/arm-deploy@v1
        with:
          subscriptionId: ${{ secrets.SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.RESOURCE_GROUP_NAME }}
          template: ./bicep/main.bicep
          parameters: location=${{ env.LOCATION }} publisherEmail=${{ secrets.PUBLISHER_EMAIL }} publisherName=${{ env.PUBLISHER_NAME }}

  deploy-web-app:

    needs: create-azure-resources
    runs-on: ubuntu-latest

    env:
      AZURE_WEBAPP_PACKAGE_PATH: 'src/WeatherApi'
      DOTNET_VERSION: '6.0.x'

    steps:

      - uses: actions/checkout@v2

      - name: Azure Login
        uses: Azure/login@v1
        with:
          creds: ${{ secrets.azure_credentials }}

      - name: Setup DotNet 6.0.X Environment
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: dotnet build and publish
        run: |
          pushd './${{ env.AZURE_WEBAPP_PACKAGE_PATH }}'
          dotnet restore
          dotnet build --configuration Release
          dotnet publish -c Release -o output

      - name: 'Run Azure webapp deploy action using publish profile credentials'
        uses: azure/webapps-deploy@v2
        with: 
          app-name: ${{ needs.create-azure-resources.outputs.webappName }}
          package: '${{ env.AZURE_WEBAPP_PACKAGE_PATH }}/output' 

      - name: logout
        run: |
          az logout        

  configurate-apim:
    
    needs: [create-azure-resources, deploy-web-app]
    runs-on: ubuntu-latest

    env:    
      RESOURCE_GROUP_NAME: rg-apim-mock-demo
      BASE_REPO_URL: 'https://raw.githubusercontent.com/hugogirard/apimMockingBackend/main'  

    steps:

      - uses: actions/checkout@v2

      - name: Azure Login
        uses: Azure/login@v1
        with:
          creds: ${{ secrets.azure_credentials }}

      - name: Deploy Azure Resources
        id: armDeployment
        uses: azure/arm-deploy@v1
        with:
          subscriptionId: ${{ secrets.SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.RESOURCE_GROUP_NAME }}
          template: ./bicep/apim.configuration.bicep
          parameters: apimName=${{ needs.create-azure-resources.outputs.apimName }} apiServiceUrl=${{ needs.create-azure-resources.outputs.webFQDN }} repobaseUrl=${{ env.BASE_REPO_URL }}

